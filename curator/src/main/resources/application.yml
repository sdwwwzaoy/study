# Server configuration
server:
  port: 8080  # Default Spring Boot port

# Spring Datasource (MySQL) configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/curator?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${your_mysql_username}  # Replace with your MySQL username
    password: ${your_mysql_password}  # Replace with your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL 8+ driver
  
  # Redis configuration
  redis:
    host: localhost  # Redis server address
    port: 6379       # Redis default port
    password: ""     # Leave empty if no password set
    timeout: 2000ms  # Connection timeout
    lettuce:
      pool:
        max-active: 8  # Maximum number of active connections
        max-idle: 8    # Maximum number of idle connections
        min-idle: 2    # Minimum number of idle connections

# MyBatis-Plus configuration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml  # Mapper XML file location
  type-aliases-package: org.example.entity      # Entity package for type aliases
  configuration:
    map-underscore-to-camel-case: true          # Enable camel case mapping
